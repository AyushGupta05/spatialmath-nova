<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpatialMath Nova - Hand Sculpt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand-lockup">
          <p class="eyebrow">SpatialMath Nova</p>
          <h1>Neon Graph Sculpt</h1>
        </div>

        <div class="topbar-tools">
          <div class="tool-cluster" aria-label="Primary tools">
            <button id="startBtn" class="tool-btn is-start" data-tooltip="Start">
              <span class="tool-label">Start</span>
            </button>
            <button id="stopBtn" class="tool-btn is-stop" data-tooltip="Stop" disabled>
              <span class="tool-label">Stop</span>
            </button>
            <button id="undoBtn" class="tool-btn is-undo" data-tooltip="Undo">
              <span class="tool-label">Undo</span>
            </button>
            <button id="clearBtn" class="tool-btn is-clear" data-tooltip="Clear">
              <span class="tool-label">Clear</span>
            </button>
            <button id="saveSceneBtn" class="tool-btn is-save" data-tooltip="Save">
              <span class="tool-label">Save</span>
            </button>
            <button id="loadSceneBtn" class="tool-btn is-load" data-tooltip="Load">
              <span class="tool-label">Load</span>
            </button>
            <button id="resetViewBtn" class="tool-btn is-reset" data-tooltip="Reset View">
              <span class="tool-label">Reset View</span>
            </button>
            <input id="loadSceneInput" type="file" accept="application/json" hidden />
          </div>

          <details class="advanced-menu">
            <summary class="tool-btn is-menu" data-tooltip="Advanced">
              <span class="tool-label">Advanced</span>
            </summary>

            <div class="advanced-panel">
              <label class="field">
                <span>Smoothing</span>
                <select id="smoothingInput">
                  <option value="0.24">Responsive</option>
                  <option value="0.38" selected>Balanced</option>
                  <option value="0.52">Stable</option>
                </select>
              </label>

              <label class="field">
                <span>Profile</span>
                <select id="trackingProfile">
                  <option value="balanced">Balanced</option>
                  <option value="stable">Stable</option>
                  <option value="responsive">Responsive</option>
                </select>
              </label>

              <label class="field">
                <span>Preset</span>
                <select id="calibrationPreset">
                  <option value="custom">Custom</option>
                  <option value="desk">Desk</option>
                  <option value="room">Room</option>
                  <option value="far">Far</option>
                </select>
              </label>

              <label class="field">
                <span>Snap</span>
                <select id="snapToggle">
                  <option value="off">Off</option>
                  <option value="on">On</option>
                </select>
              </label>

              <label class="field">
                <span>Grid Step</span>
                <select id="gridStepInput">
                  <option value="0.1">0.10</option>
                  <option value="0.25" selected>0.25</option>
                  <option value="0.5">0.50</option>
                  <option value="1.0">1.00</option>
                </select>
              </label>

              <label class="field">
                <span>Transform Snap</span>
                <select id="transformSnapMode">
                  <option value="off">Off</option>
                  <option value="position">Position</option>
                  <option value="rotation">Rotation</option>
                  <option value="all">All</option>
                </select>
              </label>

              <label class="field">
                <span>Transform Lock</span>
                <select id="transformLockMode">
                  <option value="hold">Hold</option>
                  <option value="sticky">Sticky</option>
                </select>
              </label>

              <label class="field">
                <span>Navigation</span>
                <select id="navigationMode">
                  <option value="blender" selected>Blender-style</option>
                  <option value="orbit">Orbit (standard)</option>
                </select>
              </label>

              <label class="field">
                <span>Rotation Step</span>
                <select id="rotationStepInput">
                  <option value="5">5 deg</option>
                  <option value="10">10 deg</option>
                  <option value="15" selected>15 deg</option>
                  <option value="30">30 deg</option>
                  <option value="45">45 deg</option>
                </select>
              </label>

              <button id="calibrateBtn" class="panel-btn" type="button">Capture calibration</button>
            </div>
          </details>
        </div>
      </header>

      <section class="workspace">
        <aside class="algebra-panel">
          <div class="algebra-input">
            <button class="sidebar-plus" type="button" aria-hidden="true" tabindex="-1">+</button>
            <div class="input-entry">
              <span class="input-placeholder">Input...</span>
              <span class="input-cursor" aria-hidden="true"></span>
            </div>
          </div>

          <section class="algebra-card controls-card">
            <div class="card-heading">
              <h2>Construction</h2>
              <span class="pill subtle">Neo</span>
            </div>

            <label class="field">
              <span>Shape</span>
              <select id="shapeType">
                <option value="cube">Cube</option>
                <option value="cuboid">Cuboid</option>
                <option value="sphere">Sphere</option>
                <option value="cylinder">Cylinder</option>
              </select>
            </label>

            <label class="field">
              <span>Mode (auto)</span>
              <select id="gestureMode">
                <option value="spawn">Place/Delete</option>
                <option value="transform">Transform</option>
              </select>
            </label>

            <label class="field">
              <span>Size</span>
              <select id="sizeInput">
                <option value="0.5">S</option>
                <option value="0.9" selected>M</option>
                <option value="1.3">L</option>
                <option value="1.8">XL</option>
              </select>
            </label>

            <label class="field">
              <span>Color</span>
              <input id="colorInput" type="color" value="#7cf7e4" />
            </label>
          </section>

          <section class="algebra-card status-card">
            <div class="card-heading">
              <h2>Session</h2>
              <span class="pill subtle">Live</span>
            </div>
            <p id="status" class="status" data-state="idle">Idle</p>
            <p id="intentBadge" class="status" data-state="idle">Intent: waiting</p>
          </section>

          <section class="algebra-card object-card">
            <div class="card-heading">
              <h2>Objects</h2>
              <span id="objectCount" class="pill">0</span>
            </div>
            <div id="objectList" class="object-list"></div>
          </section>

          <pre id="debugState" class="debug-box hidden">{ "handsDetected": false }</pre>
        </aside>

        <section class="graph-panel">
          <div class="stage-wrap">
            <button id="resetViewSceneBtn" class="scene-reset-btn" type="button">Reset to Default</button>
            <div class="stage" id="worldMount"></div>
            <canvas id="overlay"></canvas>
            <video id="webcam" autoplay playsinline muted></video>
          </div>
        </section>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
